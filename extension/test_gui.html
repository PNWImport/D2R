<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KZB GUI Test Harness</title>
  <style>
    /* ── Page Layout ─────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0d0d1a;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #c8c8d4;
    }
    .column {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
    }
    .col-popup {
      width: 384px;
      flex-shrink: 0;
      padding: 12px;
      background: #111122;
      border-right: 1px solid #2a2a44;
    }
    .col-controls {
      flex: 1;
      padding: 16px;
      min-width: 360px;
    }
    .col-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #222;
    }

    /* ── Popup iframe ──────────────────────────────────────────── */
    #popup-frame {
      width: 364px;
      height: calc(100vh - 50px);
      border: 1px solid #2a2a44;
      border-radius: 8px;
      background: #1a1a2e;
    }

    /* ── Test Controls ────────────────────────────────────────── */
    .scenario-group { margin-bottom: 16px; }
    .scenario-group h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #666; margin-bottom: 6px; }
    .test-btn {
      display: block; width: 100%; padding: 8px 12px; margin-bottom: 4px;
      background: #1a1a30; border: 1px solid #2a2a44; border-radius: 4px;
      color: #aab; font-size: 12px; cursor: pointer; text-align: left; transition: all 0.12s;
    }
    .test-btn:hover { background: #222244; border-color: #4a4a66; color: #dde; }
    .test-btn.active { background: #1a2a1a; border-color: #40c040; color: #40c040; }

    .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

    #log {
      margin-top: 12px; background: #0a0a14; border: 1px solid #1a1a2a; border-radius: 4px;
      padding: 10px; font-family: "SF Mono", "Fira Code", monospace; font-size: 11px;
      color: #6a6; max-height: 300px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5;
    }
    .log-err { color: #c44; }
    .log-info { color: #68a; }
    .log-ok { color: #4a4; }
    .log-cmd { color: #a8a; }

    /* Summary bar */
    .summary-bar {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 8px 12px; margin-bottom: 12px;
      background: #12122a; border-radius: 6px; border: 1px solid #2a2a44;
      font-size: 11px; color: #8888a0;
    }
    .summary-bar .stat { display: flex; gap: 4px; }
    .summary-bar .val { color: #e0c070; font-weight: 600; }
  </style>
</head>
<body>

<!-- ── Left Column: Real Popup via iframe ────────────────────────── -->
<div class="column col-popup">
  <div class="col-title">Popup Preview (360px)</div>
  <iframe id="popup-frame" src="chrome_extension/popup.html" frameborder="0"></iframe>
</div>

<!-- ── Right Column: Test Controls ─────────────────────────────── -->
<div class="column col-controls">
  <div class="col-title">Test Harness — 11 Tabs · 322 Settings</div>

  <!-- Summary bar (populated after iframe loads) -->
  <div class="summary-bar" id="summary-bar">
    <div class="stat">Tabs: <span class="val" id="sum-tabs">…</span></div>
    <div class="stat">Panels: <span class="val" id="sum-panels">…</span></div>
    <div class="stat">Config Elements: <span class="val" id="sum-cfg">…</span></div>
    <div class="stat">Checkboxes: <span class="val" id="sum-checks">…</span></div>
    <div class="stat">Numbers: <span class="val" id="sum-nums">…</span></div>
    <div class="stat">Selects: <span class="val" id="sum-selects">…</span></div>
    <div class="stat">Textareas: <span class="val" id="sum-textareas">…</span></div>
  </div>

  <div class="scenario-group">
    <h3>Connection Scenarios</h3>
    <div class="test-grid">
      <button class="test-btn" onclick="scenario('both_connected')">Both Connected (Running)</button>
      <button class="test-btn" onclick="scenario('both_disconnected')">Both Disconnected</button>
      <button class="test-btn" onclick="scenario('agent_only')">Agent Only</button>
      <button class="test-btn" onclick="scenario('map_only')">Map Host Only</button>
    </div>
  </div>

  <div class="scenario-group">
    <h3>Agent State</h3>
    <div class="test-grid">
      <button class="test-btn" onclick="scenario('running')">Running (Farming)</button>
      <button class="test-btn" onclick="scenario('paused')">Paused</button>
      <button class="test-btn" onclick="scenario('high_stats')">High Stats (4h Session)</button>
      <button class="test-btn" onclick="scenario('kill')">Kill Switch</button>
    </div>
  </div>

  <div class="scenario-group">
    <h3>Tab Navigation</h3>
    <div class="test-grid">
      <button class="test-btn" onclick="switchTab('tab-control')">Control</button>
      <button class="test-btn" onclick="switchTab('tab-scripts')">Scripts</button>
      <button class="test-btn" onclick="switchTab('tab-leech')">Leech</button>
      <button class="test-btn" onclick="switchTab('tab-combat')">Combat</button>
      <button class="test-btn" onclick="switchTab('tab-health')">Health</button>
      <button class="test-btn" onclick="switchTab('tab-class')">Class</button>
      <button class="test-btn" onclick="switchTab('tab-items')">Items</button>
      <button class="test-btn" onclick="switchTab('tab-social')">Social</button>
      <button class="test-btn" onclick="switchTab('tab-general')">General</button>
      <button class="test-btn" onclick="switchTab('tab-advanced')">Adv</button>
      <button class="test-btn" onclick="switchTab('tab-map')">Map</button>
    </div>
  </div>

  <div class="scenario-group">
    <h3>Profiles</h3>
    <div class="test-grid">
      <button class="test-btn" onclick="scenario('sorc')">Sorceress Blizzard</button>
      <button class="test-btn" onclick="scenario('necro')">Necro Summon</button>
      <button class="test-btn" onclick="scenario('pally')">Paladin Hammerdin</button>
      <button class="test-btn" onclick="scenario('barb')">Barbarian WW</button>
    </div>
  </div>

  <div class="scenario-group">
    <h3>Automated Tests</h3>
    <button class="test-btn" onclick="runAllTests()" style="background:#1a1a40;border-color:#4040a0;color:#88f;">Run All Tests</button>
  </div>

  <div id="log"></div>
</div>

<script>
// ── Log ────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, cls) {
  const d = document.createElement('div');
  d.className = cls || '';
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  d.textContent = '[' + ts + '] ' + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── iframe DOM access ──────────────────────────────────────────
const frame = document.getElementById('popup-frame');
let doc = null; // iframe's document

function P(id) { return doc ? doc.getElementById(id) : null; }
function Pall(sel) { return doc ? doc.querySelectorAll(sel) : []; }

// ── Wait for iframe load ───────────────────────────────────────
frame.addEventListener('load', () => {
  try {
    doc = frame.contentDocument || frame.contentWindow.document;
    log('iframe loaded — accessing popup DOM', 'log-ok');
    populateSummary();
  } catch (e) {
    log('WARN  Cannot access iframe DOM (CORS): ' + e.message, 'log-err');
    log('TIP   Open test_gui.html via a local web server for full functionality', 'log-info');
  }
});

// ── Summary Bar ────────────────────────────────────────────────
function populateSummary() {
  if (!doc) return;
  const tabs = Pall('.tab');
  const panels = Pall('.tab-panel');
  const cfgEls = Pall('[data-cfg]');
  const checks = Pall('input[type="checkbox"][data-cfg]');
  const nums = Pall('input[type="number"][data-cfg]');
  const selects = Pall('select[data-cfg]');
  const textareas = Pall('textarea[data-cfg]');

  document.getElementById('sum-tabs').textContent = tabs.length;
  document.getElementById('sum-panels').textContent = panels.length;
  document.getElementById('sum-cfg').textContent = cfgEls.length;
  document.getElementById('sum-checks').textContent = checks.length;
  document.getElementById('sum-nums').textContent = nums.length;
  document.getElementById('sum-selects').textContent = selects.length;
  document.getElementById('sum-textareas').textContent = textareas.length;

  log('STATS  ' + tabs.length + ' tabs, ' + panels.length + ' panels, ' + cfgEls.length + ' config elements', 'log-info');
  log('TYPES  ' + checks.length + ' checkboxes, ' + nums.length + ' numbers, ' + selects.length + ' selects, ' + textareas.length + ' textareas', 'log-info');
}

// ── Mock State ─────────────────────────────────────────────────
let state = {
  agentConnected: false, mapConnected: false, paused: false, mapActive: false, opacity: 180,
  uptime_ms: 0, frames: 0, decisions: 0, potions: 0, loots: 0, chickens: 0,
};

function setDot(dot, label, connected, text) {
  if (!dot || !label) return;
  dot.className = 'dot ' + (connected ? 'dot-ok' : 'dot-off');
  label.textContent = text || (connected ? 'Connected' : 'Disconnected');
}

function fmtTime(ms) {
  if (!ms || ms <= 0) return '—';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm ' + sec + 's';
  return sec + 's';
}
function fmtNum(n) { return (n || 0).toLocaleString(); }

function render() {
  if (!doc) return;
  const agentDot = P('agent-dot'), agentStatus = P('agent-status');
  const mapDot = P('map-dot'), mapStatus = P('map-status');
  const btnPause = P('btn-pause'), btnResume = P('btn-resume');
  const btnActivate = P('btn-map-activate'), btnDeactivate = P('btn-map-deactivate');
  const statUptime = P('stat-uptime'), statFrames = P('stat-frames');
  const statDecisions = P('stat-decisions'), statPotions = P('stat-potions');
  const statLoots = P('stat-loots'), statChickens = P('stat-chickens');
  const opSlider = P('opacity-slider'), opValue = P('opacity-value');

  if (state.agentConnected) {
    setDot(agentDot, agentStatus, true, state.paused ? 'Paused' : 'Running');
    if (btnPause) { btnPause.disabled = state.paused; }
    if (btnResume) { btnResume.disabled = !state.paused; }
    if (statUptime) statUptime.textContent = fmtTime(state.uptime_ms);
    if (statFrames) statFrames.textContent = fmtNum(state.frames);
    if (statDecisions) statDecisions.textContent = fmtNum(state.decisions);
    if (statPotions) statPotions.textContent = fmtNum(state.potions);
    if (statLoots) statLoots.textContent = fmtNum(state.loots);
    if (statChickens) statChickens.textContent = fmtNum(state.chickens);
  } else {
    setDot(agentDot, agentStatus, false);
    if (btnPause) btnPause.disabled = true;
    if (btnResume) btnResume.disabled = true;
    if (statUptime) statUptime.textContent = '—';
    if (statFrames) statFrames.textContent = '0';
    if (statDecisions) statDecisions.textContent = '0';
    if (statPotions) statPotions.textContent = '0';
    if (statLoots) statLoots.textContent = '0';
    if (statChickens) statChickens.textContent = '0';
  }
  if (state.mapConnected) {
    setDot(mapDot, mapStatus, true);
    if (btnActivate) btnActivate.disabled = state.mapActive;
    if (btnDeactivate) btnDeactivate.disabled = !state.mapActive;
  } else {
    setDot(mapDot, mapStatus, false);
    if (btnActivate) btnActivate.disabled = true;
    if (btnDeactivate) btnDeactivate.disabled = true;
  }
  if (opSlider) { opSlider.value = state.opacity; }
  if (opValue) { opValue.textContent = state.opacity; }
}

// ── Tab Switching (from harness) ───────────────────────────────
function switchTab(tabId) {
  if (!doc) { log('WARN  iframe not loaded yet', 'log-err'); return; }
  // Find the tab button with matching data-tab
  const tab = doc.querySelector('.tab[data-tab="' + tabId + '"]');
  if (tab) {
    tab.click();
    log('TAB  → ' + tab.textContent, 'log-info');
  } else {
    log('WARN  Tab not found: ' + tabId, 'log-err');
  }
}

// ── Scenarios ──────────────────────────────────────────────────
function scenario(name) {
  document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');

  switch (name) {
    case 'both_connected':
      Object.assign(state, { agentConnected: true, mapConnected: true, paused: false, mapActive: false,
        uptime_ms: 342000, frames: 15234, decisions: 8721, potions: 47, loots: 312, chickens: 3 });
      log('SCENARIO  Both connected, running', 'log-ok'); break;
    case 'both_disconnected':
      Object.assign(state, { agentConnected: false, mapConnected: false, paused: false, mapActive: false,
        uptime_ms: 0, frames: 0, decisions: 0, potions: 0, loots: 0, chickens: 0 });
      log('SCENARIO  Both disconnected', 'log-err'); break;
    case 'agent_only':
      Object.assign(state, { agentConnected: true, mapConnected: false, paused: false,
        uptime_ms: 120000, frames: 5000, decisions: 2800, potions: 12, loots: 89, chickens: 1 });
      log('SCENARIO  Agent only', 'log-info'); break;
    case 'map_only':
      Object.assign(state, { agentConnected: false, mapConnected: true, paused: false, mapActive: false, uptime_ms: 0 });
      log('SCENARIO  Map only', 'log-info'); break;
    case 'running':
      Object.assign(state, { agentConnected: true, mapConnected: true, paused: false,
        uptime_ms: 567000, frames: 28000, decisions: 16500, potions: 83, loots: 541, chickens: 7 });
      log('SCENARIO  Running (farming)', 'log-ok'); break;
    case 'paused':
      Object.assign(state, { agentConnected: true, mapConnected: true, paused: true,
        uptime_ms: 342000, frames: 15234, decisions: 8721, potions: 47, loots: 312, chickens: 3 });
      log('SCENARIO  Paused', 'log-info'); break;
    case 'high_stats':
      Object.assign(state, { agentConnected: true, mapConnected: true, paused: false,
        uptime_ms: 14400000, frames: 864000, decisions: 512000, potions: 1247, loots: 8934, chickens: 42 });
      log('SCENARIO  Long session (4h)', 'log-ok'); break;
    case 'kill':
      Object.assign(state, { agentConnected: false, mapConnected: false, mapActive: false,
        uptime_ms: 0, frames: 0, decisions: 0, potions: 0, loots: 0, chickens: 0 });
      log('KILL  All processes terminated', 'log-err'); break;
    case 'sorc':
      setProfile('sorceress_blizzard', 'Sorceress Blizzard'); break;
    case 'necro':
      setProfile('necro_summon', 'Necromancer Summon'); break;
    case 'pally':
      setProfile('paladin_hammerdin', 'Paladin Hammerdin'); break;
    case 'barb':
      setProfile('barbarian_ww', 'Barbarian WW'); break;
  }
  render();
}

function setProfile(val, label) {
  if (!doc) return;
  const configSelect = P('config-select');
  if (configSelect) {
    configSelect.value = val;
    configSelect.dispatchEvent(new Event('change'));
  }
  switchTab('tab-class');
  log('PROFILE  ' + label, 'log-info');
}

// ── Automated Tests ────────────────────────────────────────────
function runAllTests() {
  if (!doc) { log('ERROR  iframe not loaded', 'log-err'); return; }
  log('════════════════════════════════════════', 'log-info');
  log('RUNNING ALL TESTS', 'log-info');
  let pass = 0, fail = 0;

  function assert(name, condition) {
    if (condition) { log('  PASS  ' + name, 'log-ok'); pass++; }
    else { log('  FAIL  ' + name, 'log-err'); fail++; }
  }

  // ── Structure tests ──
  const tabs = Pall('.tab');
  const panels = Pall('.tab-panel');
  assert('11 tabs exist', tabs.length === 11);
  assert('11 panels exist', panels.length === 11);

  // ── Tab IDs ──
  const expectedTabs = ['tab-control','tab-scripts','tab-leech','tab-combat','tab-health',
                         'tab-class','tab-items','tab-social','tab-general','tab-advanced','tab-map'];
  expectedTabs.forEach(id => {
    assert('Panel exists: ' + id, !!P(id));
  });

  // ── Tab switching ──
  tabs[1].click(); // Scripts
  assert('Scripts tab activates', P('tab-scripts').classList.contains('active'));
  tabs[0].click(); // Back to Control

  // ── Disconnected state ──
  scenario('both_disconnected');
  const btnPause = P('btn-pause'), btnResume = P('btn-resume');
  const agentDot = P('agent-dot');
  assert('Pause disabled when disconnected', btnPause && btnPause.disabled === true);
  assert('Resume disabled when disconnected', btnResume && btnResume.disabled === true);
  assert('Agent dot off', agentDot && agentDot.classList.contains('dot-off'));

  // ── Connected state ──
  scenario('both_connected');
  assert('Agent dot green', agentDot && agentDot.classList.contains('dot-ok'));
  const mapDot = P('map-dot');
  assert('Map dot green', mapDot && mapDot.classList.contains('dot-ok'));
  assert('Pause enabled when running', btnPause && btnPause.disabled === false);
  const statUptime = P('stat-uptime');
  assert('Uptime shows value', statUptime && statUptime.textContent !== '—');
  const statFrames = P('stat-frames');
  assert('Frames > 0', statFrames && statFrames.textContent !== '0');

  // ── Paused state ──
  scenario('paused');
  const agentStatus = P('agent-status');
  assert('Status shows Paused', agentStatus && agentStatus.textContent === 'Paused');
  assert('Pause disabled when paused', btnPause && btnPause.disabled === true);
  assert('Resume enabled when paused', btnResume && btnResume.disabled === false);

  // ── High stats ──
  scenario('high_stats');
  assert('Uptime shows hours', statUptime && statUptime.textContent.includes('h'));
  assert('Frames formatted with commas', statFrames && statFrames.textContent.includes(','));

  // ── Config element counts ──
  const cfgEls = Pall('[data-cfg]');
  assert('Has 300+ config elements', cfgEls.length >= 300);
  log('  INFO  Found ' + cfgEls.length + ' config elements total', 'log-info');

  const checks = Pall('input[type="checkbox"][data-cfg]');
  assert('Has 200+ checkbox settings', checks.length >= 200);
  log('  INFO  Found ' + checks.length + ' checkboxes', 'log-info');

  const numInputs = Pall('input[type="number"][data-cfg]');
  assert('Has 50+ number inputs', numInputs.length >= 50);
  log('  INFO  Found ' + numInputs.length + ' number inputs', 'log-info');

  const selects = Pall('select[data-cfg]');
  assert('Has 10+ select dropdowns', selects.length >= 10);
  log('  INFO  Found ' + selects.length + ' selects', 'log-info');

  // ── Per-tab content ──
  const scriptChecks = Pall('#tab-scripts [data-cfg]');
  assert('Scripts tab has 40+ settings', scriptChecks.length >= 40);

  const leechChecks = Pall('#tab-leech [data-cfg]');
  assert('Leech tab has settings', leechChecks.length >= 5);

  const combatChecks = Pall('#tab-combat [data-cfg]');
  assert('Combat tab has 20+ settings', combatChecks.length >= 20);

  const healthChecks = Pall('#tab-health [data-cfg]');
  assert('Health tab has 15+ settings', healthChecks.length >= 15);

  const classChecks = Pall('#tab-class [data-cfg]');
  assert('Class tab has 30+ settings', classChecks.length >= 30);

  const itemChecks = Pall('#tab-items [data-cfg]');
  assert('Items tab has 15+ settings', itemChecks.length >= 15);

  const socialChecks = Pall('#tab-social [data-cfg]');
  assert('Social tab has settings', socialChecks.length >= 5);

  const generalChecks = Pall('#tab-general [data-cfg]');
  assert('General tab has settings', generalChecks.length >= 5);

  const advChecks = Pall('#tab-advanced [data-cfg]');
  assert('Advanced tab has settings', advChecks.length >= 5);

  // ── Profile switching + class sections ──
  const configSelect = P('config-select');
  if (configSelect) {
    configSelect.value = 'sorceress_blizzard';
    configSelect.dispatchEvent(new Event('change'));
    const sorcVis = doc.querySelector('.class-section[data-class="sorceress"]');
    assert('Sorc section visible for sorc profile', sorcVis && sorcVis.classList.contains('visible'));
    const barbVis = doc.querySelector('.class-section[data-class="barbarian"]');
    assert('Barb section hidden for sorc profile', barbVis && !barbVis.classList.contains('visible'));

    configSelect.value = '';
    configSelect.dispatchEvent(new Event('change'));
  }

  // ── Inventory grid ──
  const invGrid = P('inv-grid');
  if (invGrid) {
    const cells = invGrid.querySelectorAll('.inv-cell');
    assert('Inventory grid has 40 cells', cells.length === 40);
  } else {
    assert('Inventory grid exists', false);
  }

  // ── Opacity slider ──
  const opSlider = P('opacity-slider');
  const opValue = P('opacity-value');
  if (opSlider && opValue) {
    opSlider.value = 200;
    opSlider.dispatchEvent(new Event('input'));
    assert('Opacity updates', opValue.textContent === '200');
  }

  // ── Summary ──
  log('════════════════════════════════════════', 'log-info');
  log('RESULTS: ' + pass + '/' + (pass + fail) + ' passed, ' + fail + ' failed', fail > 0 ? 'log-err' : 'log-ok');
  if (fail === 0) log('ALL TESTS PASSED!', 'log-ok');

  scenario('both_disconnected');
}

// ── Init ───────────────────────────────────────────────────────
log('KZB GUI Test Harness loaded', 'log-ok');
log('11 tabs: Control, Scripts, Leech, Combat, Health, Class, Items, Social, General, Adv, Map', 'log-info');
log('Loading popup.html in iframe...', 'log-info');
</script>
</body>
</html>
