# D2 Vision Agent — Configuration
# Copy to C:\ProgramData\DisplayCalibration\config.yaml before running
# Default thresholds

character_class: Sorceress

survival:
  chicken_hp_pct: 30       # Exit game below this HP
  hp_potion_pct: 75        # Drink HP pot below this
  hp_rejuv_pct: 40         # Drink rejuv below this
  mana_potion_pct: 30      # Drink mana pot below this
  mana_rejuv_pct: 15       # Drink rejuv for mana below this
  tp_retreat_pct: 35        # TP retreat threshold
  merc_chicken_hp_pct: 0   # 0 = don't chicken for merc
  hp_potion_cooldown_ms: 1000
  mana_potion_cooldown_ms: 1000
  rejuv_cooldown_ms: 300

combat:
  primary_skill_key: f      # Main attack skill hotkey
  secondary_skill_key: g    # Backup skill
  teleport_key: t
  buff_keys:
    - b                     # Battle Orders / Energy Shield / etc
  buff_recast_seconds: 120
  kite_threshold: 6
  cast_interval_ms: 200

humanization:
  reaction_mean_ms: 280.0     # Average reaction time
  reaction_stddev_ms: 90.0    # Standard deviation
  survival_max_delay_ms: 150  # Hard cap for survival actions
  attack_reaction_factor: 0.65  # Faster than normal (muscle memory)
  aim_variance_px: 12
  potion_threshold_variance: 5
  skill_miss_rate: 0.03       # 3% wrong skill key
  potion_forget_rate: 0.05    # 5% forget to pot
  loot_hesitation_ms: 200

session:
  max_daily_hours: 8.0
  session_min_minutes: 60
  session_max_minutes: 180
  break_min_minutes: 30
  break_max_minutes: 120
  allowed_start_hour: 8
  allowed_end_hour: 2        # 2 AM
  day_off: null              # 0=Sun, 6=Sat. null = no day off
  ladder_start_delay_hours: 48
  short_break_rate: 0.15

loot:
  pickup_qualities:
    - Unique
    - Set
    - Rare
    - Rune
  skip_qualities:
    - Normal
    - Magic
  gold_threshold: 5000
