# Fishymancer (Summoner Necromancer) — D2R Vision Agent Config
# Kolbot source: libs/config/Necromancer.js (summoner variant)
# Summon-based — minions tank, necro casts CE and corpse explosion
# Install: copy to C:\ProgramData\DisplayCalibration\config.yaml

character_class: Necromancer
build: fishymancer

# Summoner has minion buffer — can tolerate more damage before retreating
survival:
  chicken_hp_pct: 25
  hp_potion_pct: 70
  hp_rejuv_pct: 35
  mana_potion_pct: 35           # Needs mana for CE spam
  mana_rejuv_pct: 0
  tp_retreat_pct: 30
  merc_chicken_hp_pct: 0
  hp_potion_cooldown_ms: 1000
  mana_potion_cooldown_ms: 1000
  rejuv_cooldown_ms: 300
  min_belt_column: [2, 2, 4, 0] # More mana pots for CE; BeltColumn = ["hp","hp","mp","mp"]

combat:
  primary_skill_key: "f"        # Corpse Explosion (AttackSkill[1]/[3])
  secondary_skill_key: "g"      # Bone Spear / Amp Damage curse (immune fallback)
  teleport_key: null            # No teleport (use running)
  preattack_key: "d"            # Amplify Damage curse (AttackSkill[0])
  immunity_fallback_key: "g"    # Bone Spear vs physical immune
  boss_priority: true
  kite_threshold: 8             # Minions front-line, summon can handle more
  cast_interval_ms: 300         # CE has cast animation
  max_attack_count: 200
  use_merc_stomp: true
  static_field: null

# Necromancer precasts: Skeletons, Revives, Clay Golem
# These are complex — the vision agent handles them as long-duration buffs
buffs:
  - name: "Skeleton Army"       # Visual: corpse-colored minions present
    hotkey: "a"
    visual_check: false
    duration_secs: 999          # Permanent until death
  - name: "Clay Golem"
    hotkey: "q"
    visual_check: false
    duration_secs: 999

loot:
  pickup_qualities: [Unique, Set, Rare, Rune]
  skip_qualities: [Normal, Magic]
  gold_threshold: 3000
  prioritize_runes_uniques: true
  max_pickup_distance: 400

town:
  go_to_town_triggers:
    belt_potions_below: 3       # Needs more pots due to mana usage
    inventory_slots_below: 4
    merc_dead: true
    durability_low: true
  task_order: [revive_merc, heal, repair, identify, stash, buy_potions]
  stash_rules:
    always_stash: ["unique", "set", "rune"]
    id_then_evaluate: ["rare_ring", "rare_amulet"]
    always_sell: ["magic_non_charm"]

humanization:
  reaction_mean_ms: 300.0       # Summoners play slower, more deliberate
  reaction_stddev_ms: 100.0
  survival_max_delay_ms: 160
  attack_reaction_factor: 0.70
  aim_variance_px: 20           # CE targets corpse locations
  potion_threshold_variance: 7
  skill_miss_rate: 0.04
  potion_forget_rate: 0.06
  loot_hesitation_ms: 250
  path_deviate_rate: 0.10
  path_deviate_px: 45
  idle_pause_min_ms: 2000
  idle_pause_max_ms: 7000
  idle_pause_rate: 0.025
  aggression_drift_per_hour: 0.03
  caution_drift_per_hour: 0.03

session:
  max_daily_hours: 8.0
  session_min_minutes: 60
  session_max_minutes: 180
  break_min_minutes: 30
  break_max_minutes: 120
  allowed_start_hour: 9
  allowed_end_hour: 23
  day_off: null
  ladder_start_delay_hours: 48
  short_break_rate: 0.12
