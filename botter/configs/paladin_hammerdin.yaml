# Hammerdin Paladin — D2R Vision Agent Config
# Kolbot source: libs/config/Paladin.js (hammerdin variant)
# Install: copy to C:\ProgramData\DisplayCalibration\config.yaml

character_class: Paladin
build: hammerdin

# Hammerdins have high survivability — more aggressive thresholds
survival:
  chicken_hp_pct: 20            # Config.LifeChicken = 30, din can go lower
  hp_potion_pct: 65             # Config.UseHP = 75, buffed = less needed
  hp_rejuv_pct: 35
  mana_potion_pct: 25           # Config.UseMP = 30
  mana_rejuv_pct: 0
  tp_retreat_pct: 25
  merc_chicken_hp_pct: 0
  hp_potion_cooldown_ms: 1000
  mana_potion_cooldown_ms: 1000
  rejuv_cooldown_ms: 300
  min_belt_column: [3, 3, 3, 0] # Config.MinColumn; Config.BeltColumn = ["hp","hp","mp","rv"]

combat:
  primary_skill_key: "f"        # Blessed Hammer (AttackSkill[1]/[3])
  secondary_skill_key: "f"      # Same — hammers hit everything (no immunity issue)
  teleport_key: "t"             # Charge or Vigor run (no teleport unless Enigma)
  preattack_key: null           # No preattack
  immunity_fallback_key: null   # Hammers bypass immunities
  boss_priority: true
  kite_threshold: 10            # Hammerdin is tanky, higher kite threshold
  cast_interval_ms: 150         # Faster cast cycle for hammers
  max_attack_count: 300
  use_merc_stomp: true
  static_field: null            # No static field on paladin

# Paladin-specific: Vigor for running, Redemption for recovery
# Config.Vigor = true; Config.Redemption = [50, 50]
buffs:
  - name: "Concentration"       # Main aura — bind to aura key
    hotkey: "a"
    visual_check: false
    duration_secs: 0            # Permanent — never expires
  - name: "Holy Shield"         # Bind to separate key
    hotkey: "s"
    visual_check: false
    duration_secs: 180          # Recast every 3 min

loot:
  pickup_qualities: [Unique, Set, Rare, Rune]
  skip_qualities: [Normal, Magic]
  gold_threshold: 5000
  prioritize_runes_uniques: true
  max_pickup_distance: 400

town:
  go_to_town_triggers:
    belt_potions_below: 2
    inventory_slots_below: 4
    merc_dead: true
    durability_low: true
  task_order: [revive_merc, heal, repair, identify, stash, buy_potions]
  stash_rules:
    always_stash: ["unique", "set", "rune"]
    id_then_evaluate: ["rare_ring", "rare_amulet"]
    always_sell: ["magic_non_charm"]

humanization:
  reaction_mean_ms: 260.0       # Slightly faster — pally muscle memory
  reaction_stddev_ms: 85.0
  survival_max_delay_ms: 130
  attack_reaction_factor: 0.60
  aim_variance_px: 18           # Hammers are point-and-spiral, more loose
  potion_threshold_variance: 6
  skill_miss_rate: 0.02
  potion_forget_rate: 0.04
  loot_hesitation_ms: 180
  path_deviate_rate: 0.06
  path_deviate_px: 35
  idle_pause_min_ms: 1500
  idle_pause_max_ms: 5000
  idle_pause_rate: 0.015
  aggression_drift_per_hour: 0.05
  caution_drift_per_hour: 0.02

session:
  max_daily_hours: 8.0
  session_min_minutes: 60
  session_max_minutes: 180
  break_min_minutes: 30
  break_max_minutes: 120
  allowed_start_hour: 9
  allowed_end_hour: 23
  day_off: null
  ladder_start_delay_hours: 48
  short_break_rate: 0.12
